<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/cat.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MomoTodo</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background-color: #F6F4E8; }

      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #F6F4E8;
        gap: 1rem;
        z-index: 9999;
      }

      .loading-title {
        font-size: 1.2rem;
        font-weight: 700;
        background: linear-gradient(135deg, #5a8f7b, #c07a7a);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-family: -apple-system, sans-serif;
      }

      .loading-dots {
        display: flex;
        gap: 0.4rem;
      }

      .loading-dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background-color: #94bba9;
        animation: bounce 1.2s ease-in-out infinite;
      }

      .loading-dot:nth-child(2) { animation-delay: 0.2s; background-color: #DC9B9B; }
      .loading-dot:nth-child(3) { animation-delay: 0.4s; background-color: #94bba9; }

      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <span class="loading-title">MomoTodo</span>
      <div class="loading-dots">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // React 로드되면 로딩 화면 숨기기
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loading = document.getElementById('loading')
          if (loading) {
            loading.style.transition = 'opacity 0.3s'
            loading.style.opacity = '0'
            setTimeout(() => loading.remove(), 300)
          }
        }, 200)
      })
    </script>
  </body>
</html>
